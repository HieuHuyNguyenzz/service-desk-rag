services:
  service-desk-rag:
    build:
      context: .
      args:
        - HTTP_PROXY=http://10.255.249.100:3128
        - HTTPS_PROXY=http://10.255.249.100:3128
    container_name: service-desk-rag-sync
    env_file:
      - .env
    dns:
      - 10.255.244.100
      - 8.8.8.8
    extra_hosts:
      - "servicedesk.viettelcyber.com:10.255.244.100"
    volumes:
      - ./sync_state.json:/app/sync_state.json
    restart: unless-stopped
    networks:
      - docker_default

networks:
  docker_default:
    external: true
