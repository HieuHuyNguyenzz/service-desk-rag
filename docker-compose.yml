services:
  service-desk-rag:
    build:
      context: .
      args:
        - HTTP_PROXY=http://x.x.x.x:x
        - HTTPS_PROXY=http://x.x.x.x:x
    container_name: service-desk-rag-sync
    env_file:
      - .env
    dns:
      - 10.255.244.100
      - 8.8.8.8
    extra_hosts:
      - "servicedesk.x.com:x.x.x.x"
    volumes:
      - ./sync_state.json:/app/sync_state.json
    restart: unless-stopped
    networks:
      - docker_default

networks:
  docker_default:
    external: true
